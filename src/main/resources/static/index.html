<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<h1>Conflict Tracker</h1>

<table id="conflict-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
        <th>Fecha de inicio</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
    fetch('/api/v1/conflicts')
        .then(response => {
            if (!response.ok) {
                throw new Error('Error al cargar los conflictos');
            }
            return response.json();
        })
        .then(data => {
            const tbody = document.querySelector('#conflict-table tbody');
            data.forEach(conflict => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${conflict.id}</td>
                    <td>${conflict.name}</td>
                    <td>${conflict.status}</td>
                    <td>${conflict.startDate}</td>
                `;
                tbody.appendChild(row);
            });
        })
        .catch(error => console.error(error));
</script>
</body>
</html>
